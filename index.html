          "name": "What trace width do I need for 1A in KiCad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For 1A with a 10°C temperature rise on an external copper layer (1 oz), IPC-2221 gives approximately 0.2mm minimum. Always add a 20–30% safety margin, so use 0.25–0.3mm in practice."
          }
        },
        {
          "@type": "Question",
          "name": "How do I export Gerbers from KiCad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In KiCad PCB Editor: File → Fabrication Outputs → Gerbers. Select F.Cu, B.Cu, F.Mask, B.Mask, F.Silkscreen, B.Silkscreen, and Edge.Cuts. Then generate drill files via File → Fabrication Outputs → Drill Files. Zip all files and upload to your fab house."
          }
        },
        {
          "@type": "Question",
          "name": "What is the shortcut to fill copper zones in KiCad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Press B to fill all copper zones in KiCad's PCB editor. Press Ctrl+B to unfill (remove fill). Always press B after making any changes to ensure your copper pour is up to date."
          }
        },
        {
          "@type": "Question",
          "name": "What via size should I use in KiCad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For standard signal routing use 0.3mm drill / 0.6mm pad. For power vias use 0.4–0.6mm drill / 0.8–1.0mm pad. For thermal vias under ICs use 0.3mm drill / 0.6mm pad with tented bottom."
          }
        }
      ]
